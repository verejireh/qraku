# 개발용 docker-compose — WS-02 Pub/Sub 다중 인스턴스 검증 가능
# backend1(host 8003) + backend2(host 8004) 별도 포트로 노출
# WS-02 fan-out 검증: wscat -c ws://localhost:8003/ws/... + curl POST localhost:8004/api/...

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpw}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-qraku}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-rootpw}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend1: &backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      INSTANCE_ID: dev-1
      DATABASE_URL: mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-rootpw}@mysql:3306/${MYSQL_DATABASE:-qraku}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8003,http://localhost:8004
    volumes:
      - ./backend:/app/backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8003:8003"

  backend2:
    <<: *backend
    environment:
      INSTANCE_ID: dev-2
      DATABASE_URL: mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-rootpw}@mysql:3306/${MYSQL_DATABASE:-qraku}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8003,http://localhost:8004
    ports:
      - "8004:8003"

  worker:
    <<: *backend
    command: ["uv","run","dramatiq","backend.workers.translate_tasks","-p","2","-t","4"]
    ports: []
    environment:
      INSTANCE_ID: worker
      DATABASE_URL: mysql+aiomysql://root:${MYSQL_ROOT_PASSWORD:-rootpw}@mysql:3306/${MYSQL_DATABASE:-qraku}
      REDIS_URL: redis://redis:6379/0
      DRAMATIQ_BROKER_URL: redis://redis:6379/0

  frontend:
    build:
      context: .
      dockerfile: frontend-react/Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend1:8003
    volumes:
      - ./frontend-react:/app
      - /app/node_modules
    depends_on:
      - backend1

volumes:
  mysql_data:
