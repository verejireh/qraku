# 개발용 docker-compose — WS-02 Pub/Sub 다중 인스턴스 검증 가능
# backend1(host 8003) + backend2(host 8004) 별도 포트로 노출
# WS-02 fan-out 검증: wscat -c ws://localhost:8003/ws/... + curl POST localhost:8004/api/...
# [DBM-13] MySQL 서비스 제거 완료 (2026-05-19 컷오버). PostgreSQL 전용.

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qraku}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-qraku}
      POSTGRES_DB: ${POSTGRES_DB:-qraku}
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-qraku}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend1: &backend
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      INSTANCE_ID: dev-1
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-qraku}:${POSTGRES_PASSWORD:-qraku}@postgres:5432/${POSTGRES_DB:-qraku}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8003,http://localhost:8004
    volumes:
      - ./backend:/app/backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8003:8003"

  backend2:
    <<: *backend
    environment:
      INSTANCE_ID: dev-2
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-qraku}:${POSTGRES_PASSWORD:-qraku}@postgres:5432/${POSTGRES_DB:-qraku}
      REDIS_URL: redis://redis:6379/0
      ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8003,http://localhost:8004
    ports:
      - "8004:8003"

  worker:
    <<: *backend
    command: ["uv","run","dramatiq","backend.workers.translate_tasks","-p","2","-t","4"]
    ports: []
    environment:
      INSTANCE_ID: worker
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-qraku}:${POSTGRES_PASSWORD:-qraku}@postgres:5432/${POSTGRES_DB:-qraku}
      REDIS_URL: redis://redis:6379/0
      DRAMATIQ_BROKER_URL: redis://redis:6379/0

  frontend:
    build:
      context: .
      dockerfile: frontend-react/Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend1:8003
    volumes:
      - ./frontend-react:/app
      - /app/node_modules
    depends_on:
      - backend1

volumes:
  pg_data:
